# T15-E: CI mínimo — que cada push compile y pase los tests del server antes (o a la par) de que
# Render lo tome. El cliente MAUI queda fuera a propósito (lento y quisquilloso en CI).
name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Tests (server + shared)
        run: dotnet test tests/PetProductivity.Tests/PetProductivity.Tests.csproj --nologo
